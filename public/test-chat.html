<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجربة الشات المباشر - Laravel Reverb</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Cairo:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-accent: #6366f1;
            --secondary-accent: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 700px;
            height: 80vh;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            padding: 20px;
            background: rgba(15, 23, 42, 0.6);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ef4444;
            transition: all 0.3s ease;
        }

        .status-dot.connected {
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        /* Config Bar */
        .chat-config {
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.3);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 150px;
        }

        .config-group label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .config-group select,
        .config-group input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 8px 12px;
            color: var(--text-main);
            outline: none;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .config-group select:focus,
        .config-group input:focus {
            border-color: var(--primary-accent);
        }

        /* Message Area */
        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-bubble {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            position: relative;
            line-height: 1.5;
            animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            font-size: 0.95rem;
        }

        .message-bubble.incoming {
            background: rgba(51, 65, 85, 0.5);
            margin-right: auto;
            /* دايمًا يسار بصرف النظر عن RTL */
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .message-bubble.outgoing {
            background: linear-gradient(135deg, var(--primary-accent) 0%, var(--secondary-accent) 100%);
            margin-left: auto;
            /* دايمًا يمين بصرف النظر عن RTL */
            border-bottom-left-radius: 4px;
        }

        .sender-name {
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 4px;
            display: block;
            opacity: 0.8;
        }

        .message-time {
            font-size: 0.65rem;
            display: block;
            text-align: left;
            margin-top: 6px;
            opacity: 0.6;
        }

        /* Online Users Panel */
        .online-panel {
            padding: 12px 20px;
            background: rgba(15, 23, 42, 0.25);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            min-height: 48px;
        }

        /* Search Panel */
        .search-panel {
            padding: 10px 20px;
            background: rgba(15, 23, 42, 0.3);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-input-wrap {
            flex: 1;
            min-width: 160px;
            position: relative;
        }

        .search-input {
            width: 100%;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 7px 36px 7px 12px;
            color: var(--text-main);
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus { border-color: var(--primary-accent); }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
            font-size: 0.85rem;
            pointer-events: none;
        }

        .search-btn {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 7px 16px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s;
        }

        .search-btn:hover { opacity: 0.85; }
        .search-btn.secondary {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--glass-border);
        }

        /* Search Results Overlay */
        .search-results {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.97);
            z-index: 10;
            overflow-y: auto;
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 12px;
            animation: fadeIn 0.2s ease;
        }

        .search-results.visible { display: flex; }

        .search-results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .search-results-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary-accent);
        }

        .search-close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }

        .search-result-item {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            transition: border-color 0.2s;
        }

        .search-result-item:hover { border-color: var(--primary-accent); }

        .search-result-meta {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            display: flex;
            gap: 10px;
        }

        .search-result-text {
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .search-highlight {
            background: rgba(99, 102, 241, 0.35);
            border-radius: 3px;
            padding: 0 2px;
            font-weight: 700;
        }

        .search-empty {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-size: 0.9rem;
        }

        /* Messages area must be relative for overlay */
        .messages-area { position: relative; }

        .online-panel-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 600;
            white-space: nowrap;
        }

        .online-users-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3px 10px 3px 6px;
            font-size: 0.78rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .user-badge.online {
            border-color: rgba(16, 185, 129, 0.4);
            background: rgba(16, 185, 129, 0.08);
        }

        .user-badge.offline {
            opacity: 0.45;
        }

        .user-badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .user-badge.online .user-badge-dot {
            background: #10b981;
            box-shadow: 0 0 6px #10b981;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 4px #10b981; }
            50%       { box-shadow: 0 0 10px #10b981; }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: rgba(15, 23, 42, 0.6);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
        }

        .message-input {
            flex: 1;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px 20px;
            color: var(--text-main);
            outline: none;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .message-input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.25);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary-accent) 0%, var(--secondary-accent) 100%);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0 28px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.35);
        }

        .send-btn:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <h2>شات تجربة Laravel Reverb المباشر ⚡</h2>
            <div class="status-badge">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">جاري الاتصال...</span>
            </div>
        </div>

        <!-- Configuration -->
        <div class="chat-config">
            <div class="config-group">
                <label for="currentUserSelect">أنا أرسل كـ (المرسل الحالي):</label>
                <select id="currentUserSelect" onchange="loadMessagesAndReconnect()">
                    <option value="1">Ahmed (ID: 1)</option>
                    <option value="2">Mohamed (ID: 2)</option>
                    <option value="3">Ali (ID: 3)</option>
                </select>
            </div>
            <div class="config-group">
                <label for="conversationIdInput">رقم المحادثة (Conversation ID):</label>
                <input type="number" id="conversationIdInput" value="2" min="1" onchange="loadMessagesAndReconnect()">
            </div>
            <div class="config-group" style="justify-content: flex-end;">
                <button class="send-btn" style="padding: 8px 15px; font-size: 0.85rem;"
                    onclick="loadMessagesAndReconnect()">تحميل وإعادة اتصال</button>
            </div>
        </div>

        <!-- Online Users Panel -->
        <div class="online-panel">
            <span class="online-panel-label">متصلون حالياً:</span>
            <div class="online-users-list" id="onlineUsersList">
                <!-- filled by JS -->
            </div>
        </div>

        <!-- Search Panel -->
        <div class="search-panel">
            <!-- Global Search -->
            <div class="search-input-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="globalSearchInput"
                    placeholder="بحث عام في كل المحادثات..."
                    onkeydown="if(event.key==='Enter') globalSearch()">
            </div>
            <button class="search-btn" onclick="globalSearch()">بحث عام</button>

            <!-- Conversation Search -->
            <div class="search-input-wrap">
                <span class="search-icon">💬</span>
                <input type="text" class="search-input" id="convSearchInput"
                    placeholder="بحث في هذه المحادثة..."
                    onkeydown="if(event.key==='Enter') convSearch()">
            </div>
            <button class="search-btn secondary" onclick="convSearch()">بحث في المحادثة</button>
        </div>

        <!-- Messages Area -->
        <div class="messages-area" id="messagesArea">
            <!-- Search Results Overlay -->
            <div class="search-results" id="searchResultsOverlay">
                <div class="search-results-header">
                    <span class="search-results-title" id="searchResultsTitle">نتائج البحث</span>
                    <button class="search-close-btn" onclick="closeSearch()">✕</button>
                </div>
                <div id="searchResultsList"></div>
            </div>
            <!-- Messages will load here dynamically -->
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <input type="text" class="message-input" id="messageInput" placeholder="اكتب رسالتك هنا..."
                onkeydown="handleKeyDown(event)">
            <button class="send-btn" onclick="sendMessage()">إرسال 🚀</button>
        </div>
    </div>

    <script>
        let socket = null;
        let heartbeatInterval = null;
        const REVERB_KEY = 'wf';
        const REVERB_PORT = 8080;

        // ─── Presence ────────────────────────────────────────────────

        async function fetchOnlineUsers() {
            try {
                const res  = await fetch('/api/chat/users/online');
                const data = await res.json();
                if (data.success) renderOnlineUsers(data.data);
            } catch (e) {
                console.error('fetchOnlineUsers error:', e);
            }
        }

        function renderOnlineUsers(users) {
            const list = document.getElementById('onlineUsersList');
            list.innerHTML = '';
            users.forEach(u => {
                const badge = document.createElement('div');
                badge.className = `user-badge ${u.is_online ? 'online' : 'offline'}`;
                badge.id = `user-badge-${u.id}`;
                badge.innerHTML = `
                    <span class="user-badge-dot"></span>
                    <span>${u.name}</span>
                `;
                list.appendChild(badge);
            });
        }

        function updateUserBadge(userId, status) {
            const badge = document.getElementById(`user-badge-${userId}`);
            if (!badge) return;
            if (status === 'online') {
                badge.classList.add('online');
                badge.classList.remove('offline');
            } else {
                badge.classList.remove('online');
                badge.classList.add('offline');
            }
        }

        async function setUserOnline(userId) {
            await fetch('/api/chat/presence/online', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            });
        }

        async function setUserOffline(userId) {
            // Use sendBeacon so it fires even on page unload
            const blob = new Blob([JSON.stringify({ user_id: userId })], { type: 'application/json' });
            navigator.sendBeacon('/api/chat/presence/offline', blob);
        }

        function startHeartbeat(userId) {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            heartbeatInterval = setInterval(() => setUserOnline(userId), 30000);
        }

        function stopHeartbeat() {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            heartbeatInterval = null;
        }

        // ─── Search ───────────────────────────────────────────────────

        function highlightText(text, keyword) {
            if (!keyword) return text;
            const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(`(${escaped})`, 'gi'),
                '<span class="search-highlight">$1</span>');
        }

        function renderSearchResults(results, keyword, title) {
            const overlay = document.getElementById('searchResultsOverlay');
            const list    = document.getElementById('searchResultsList');
            document.getElementById('searchResultsTitle').textContent = title;

            list.innerHTML = '';

            if (results.length === 0) {
                list.innerHTML = `<div class="search-empty">😔 لا توجد نتائج لـ "<strong>${keyword}</strong>"</div>`;
            } else {
                results.forEach(msg => {
                    const time = msg.created_at
                        ? new Date(msg.created_at).toLocaleString('ar-EG')
                        : '';
                    const item = document.createElement('div');
                    item.className = 'search-result-item';
                    item.innerHTML = `
                        <div class="search-result-meta">
                            <span>👤 ${msg.sender?.name ?? ''}</span>
                            ${msg.conversation ? `<span>💬 محادثة #${msg.conversation.id}</span>` : ''}
                            <span>🕐 ${time}</span>
                        </div>
                        <div class="search-result-text">${highlightText(msg.message, keyword)}</div>
                    `;
                    list.appendChild(item);
                });
            }

            overlay.classList.add('visible');
        }

        function closeSearch() {
            document.getElementById('searchResultsOverlay').classList.remove('visible');
            document.getElementById('globalSearchInput').value = '';
            document.getElementById('convSearchInput').value   = '';
        }

        async function globalSearch() {
            const keyword = document.getElementById('globalSearchInput').value.trim();
            if (!keyword) return;
            try {
                const res  = await fetch(`/api/chat/search?q=${encodeURIComponent(keyword)}`);
                const data = await res.json();
                renderSearchResults(data.data ?? [], keyword,
                    `بحث عام: "${keyword}" — ${data.count ?? 0} نتيجة`);
            } catch (e) {
                console.error('globalSearch error:', e);
            }
        }

        async function convSearch() {
            const keyword = document.getElementById('convSearchInput').value.trim();
            const convId  = parseInt(document.getElementById('conversationIdInput').value);
            if (!keyword) return;
            try {
                const res  = await fetch(`/api/chat/conversations/${convId}/search?q=${encodeURIComponent(keyword)}`);
                const data = await res.json();
                renderSearchResults(data.data ?? [], keyword,
                    `بحث في محادثة #${convId}: "${keyword}" — ${data.count ?? 0} نتيجة`);
            } catch (e) {
                console.error('convSearch error:', e);
            }
        }

        // ─── Messages history ────────────────────────────────────────

        async function fetchMessages(conversationId) {

            try {
                const response = await fetch(`/api/chat/conversations/${conversationId}/messages`);
                const result = await response.json();

                const messagesArea = document.getElementById('messagesArea');
                messagesArea.innerHTML = ''; // clear

                if (result.success && result.data) {
                    // Reverse to show oldest first in UI
                    const messages = result.data.reverse();
                    messages.forEach(msg => {
                        appendMessageToUI(msg);
                    });
                    scrollToBottom();
                }
            } catch (error) {
                console.error("Error loading messages:", error);
            }
        }

        // Connect to WebSocket Server (Reverb)
        function connectWebsocket(conversationId) {
            if (socket) {
                socket.close();
            }

            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            statusDot.className = 'status-dot';
            statusText.innerText = 'جاري الاتصال بـ Reverb...';

            const wsUrl = `ws://127.0.0.1:${REVERB_PORT}/app/${REVERB_KEY}?protocol=7&client=js&version=8.4.0-rc2&flash=false`;
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                statusDot.classList.add('connected');
                statusText.innerText = 'متصل بـ Reverb ⚡';

                // Subscribe to Reverb Channel
                const subscribeMessage = {
                    event: 'pusher:subscribe',
                    data: {
                        channel: 'chat'
                    }
                };
                socket.send(JSON.stringify(subscribeMessage));
            };

            socket.onmessage = (event) => {
                const payload = JSON.parse(event.data);

                // When receiving broadcasted message
                if (payload.event === 'App\\Events\\MessageSent') {
                    const messageData = typeof payload.data === 'string' ? JSON.parse(payload.data) : payload.data;
                    const msg = messageData.message ? messageData.message : messageData;

                    // Only append if it belongs to the current active conversation
                    const activeConvId = parseInt(document.getElementById('conversationIdInput').value);
                    if (parseInt(msg.conversation_id) === activeConvId) {
                        appendMessageToUI(msg);
                        scrollToBottom();
                    }
                }

                // When a user status changes (online / offline)
                if (payload.event === 'App\\Events\\UserStatusChanged') {
                    const data = typeof payload.data === 'string' ? JSON.parse(payload.data) : payload.data;
                    const user = data.user;
                    updateUserBadge(user.id, user.status);
                }
            };

            socket.onclose = () => {
                statusDot.className = 'status-dot';
                statusText.innerText = 'مقطوع الاتصال. جاري إعادة المحاولة...';
                
                // Auto reconnect after 3 seconds
                setTimeout(() => {
                    const activeConvId = parseInt(document.getElementById('conversationIdInput').value);
                    connectWebsocket(activeConvId);
                }, 3000);
            };
        }

        function appendMessageToUI(msg) {
            const messagesArea = document.getElementById('messagesArea');
            const currentUserId = parseInt(document.getElementById('currentUserSelect').value);

            const isOutgoing = parseInt(msg.sender_id) === currentUserId;

            const time = msg.created_at
                ? new Date(msg.created_at).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' })
                : '';
            const senderName = msg.sender ? msg.sender.name : 'مستخدم';

            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${isOutgoing ? 'outgoing' : 'incoming'}`;

            // استخدام margin بدل align-self لأن align-self بيتأثر بـ RTL
            // margin-left:auto دايمًا بيدفع الرسالة ليمين فيزيائياً
            // margin-right:auto دايمًا بيدفع الرسالة ليسار فيزيائياً
            if (isOutgoing) {
                bubble.style.marginLeft = 'auto';
                bubble.style.marginRight = '0';
            } else {
                bubble.style.marginRight = 'auto';
                bubble.style.marginLeft = '0';
            }

            bubble.innerHTML = `
                <span class="sender-name">${senderName}</span>
                <div>${msg.message}</div>
                <span class="message-time">${time}</span>
            `;

            messagesArea.appendChild(bubble);
        }

        function scrollToBottom() {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Send message API Call
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            const conversationId = parseInt(document.getElementById('conversationIdInput').value);
            const senderId = parseInt(document.getElementById('currentUserSelect').value);

            // Clear input
            input.value = '';

            try {
                const response = await fetch('/api/chat/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        conversation_id: conversationId,
                        sender_id: senderId,
                        message: text
                    })
                });

                const result = await response.json();
                if (!result.success) {
                    alert('فشل في إرسال الرسالة!');
                }
            } catch (error) {
                console.error("Error sending message:", error);
            }
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function loadMessagesAndReconnect() {
            const conversationId = parseInt(document.getElementById('conversationIdInput').value);
            const userId = parseInt(document.getElementById('currentUserSelect').value);
            fetchMessages(conversationId);
            connectWebsocket(conversationId);
            // Re-register presence whenever user/conv changes
            setUserOnline(userId).then(() => fetchOnlineUsers());
            startHeartbeat(userId);
        }

        // Initial Load
        window.onload = () => {
            const conversationId = parseInt(document.getElementById('conversationIdInput').value);
            const userId = parseInt(document.getElementById('currentUserSelect').value);
            fetchMessages(conversationId);
            connectWebsocket(conversationId);
            fetchOnlineUsers();
            setUserOnline(userId).then(() => fetchOnlineUsers());
            startHeartbeat(userId);
        };

        // Mark user offline when page closes
        window.addEventListener('beforeunload', () => {
            const userId = parseInt(document.getElementById('currentUserSelect').value);
            stopHeartbeat();
            setUserOffline(userId);
        });
    </script>
</body>

</html>
