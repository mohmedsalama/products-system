<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجربة الشات المباشر - Laravel Reverb</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Cairo:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-accent: #6366f1;
            --secondary-accent: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 700px;
            height: 80vh;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            padding: 20px;
            background: rgba(15, 23, 42, 0.6);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ef4444;
            transition: all 0.3s ease;
        }

        .status-dot.connected {
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        /* Config Bar */
        .chat-config {
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.3);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 150px;
        }

        .config-group label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .config-group select,
        .config-group input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 8px 12px;
            color: var(--text-main);
            outline: none;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .config-group select:focus,
        .config-group input:focus {
            border-color: var(--primary-accent);
        }

        /* Message Area */
        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-bubble {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            position: relative;
            line-height: 1.5;
            animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            font-size: 0.95rem;
        }

        .message-bubble.incoming {
            background: rgba(51, 65, 85, 0.5);
            margin-right: auto;
            /* دايمًا يسار بصرف النظر عن RTL */
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .message-bubble.outgoing {
            background: linear-gradient(135deg, var(--primary-accent) 0%, var(--secondary-accent) 100%);
            margin-left: auto;
            /* دايمًا يمين بصرف النظر عن RTL */
            border-bottom-left-radius: 4px;
        }

        .sender-name {
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 4px;
            display: block;
            opacity: 0.8;
        }

        .message-time {
            font-size: 0.65rem;
            display: block;
            text-align: left;
            margin-top: 6px;
            opacity: 0.6;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: rgba(15, 23, 42, 0.6);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
        }

        .message-input {
            flex: 1;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px 20px;
            color: var(--text-main);
            outline: none;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .message-input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.25);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary-accent) 0%, var(--secondary-accent) 100%);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0 28px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.35);
        }

        .send-btn:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <h2>شات تجربة Laravel Reverb المباشر ⚡</h2>
            <div class="status-badge">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">جاري الاتصال...</span>
            </div>
        </div>

        <!-- Configuration -->
        <div class="chat-config">
            <div class="config-group">
                <label for="currentUserSelect">أنا أرسل كـ (المرسل الحالي):</label>
                <select id="currentUserSelect">
                    <option value="1">Ahmed (ID: 1)</option>
                    <option value="2">Mohamed (ID: 2)</option>
                    <option value="3">Ali (ID: 3)</option>
                </select>
            </div>
            <div class="config-group">
                <label for="conversationIdInput">رقم المحادثة (Conversation ID):</label>
                <input type="number" id="conversationIdInput" value="2" min="1">
            </div>
            <div class="config-group" style="justify-content: flex-end;">
                <button class="send-btn" style="padding: 8px 15px; font-size: 0.85rem;"
                    onclick="loadMessagesAndReconnect()">تحميل وإعادة اتصال</button>
            </div>
        </div>

        <!-- Messages Area -->
        <div class="messages-area" id="messagesArea">
            <!-- Messages will load here dynamically -->
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <input type="text" class="message-input" id="messageInput" placeholder="اكتب رسالتك هنا..."
                onkeydown="handleKeyDown(event)">
            <button class="send-btn" onclick="sendMessage()">إرسال 🚀</button>
        </div>
    </div>

    <script>
        let socket = null;
        const REVERB_KEY = 'wf';
        const REVERB_PORT = 8080;

        // Load messages history on load
        async function fetchMessages(conversationId) {
            try {
                const response = await fetch(`/api/chat/conversations/${conversationId}/messages`);
                const result = await response.json();

                const messagesArea = document.getElementById('messagesArea');
                messagesArea.innerHTML = ''; // clear

                if (result.success && result.data) {
                    // Reverse to show oldest first in UI
                    const messages = result.data.reverse();
                    messages.forEach(msg => {
                        appendMessageToUI(msg);
                    });
                    scrollToBottom();
                }
            } catch (error) {
                console.error("Error loading messages:", error);
            }
        }

        // Connect to WebSocket Server (Reverb)
        function connectWebsocket(conversationId) {
            if (socket) {
                socket.close();
            }

            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            statusDot.className = 'status-dot';
            statusText.innerText = 'جاري الاتصال بـ Reverb...';

            const wsUrl = `ws://127.0.0.1:${REVERB_PORT}/app/${REVERB_KEY}?protocol=7&client=js&version=8.4.0-rc2&flash=false`;
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                statusDot.classList.add('connected');
                statusText.innerText = 'متصل بـ Reverb ⚡';

                // Subscribe to Reverb Channel
                const subscribeMessage = {
                    event: 'pusher:subscribe',
                    data: {
                        channel: 'chat'
                    }
                };
                socket.send(JSON.stringify(subscribeMessage));
            };

            socket.onmessage = (event) => {
                const payload = JSON.parse(event.data);

                // When receiving broadcasted message
                if (payload.event === 'App\\Events\\MessageSent') {
                    const messageData = typeof payload.data === 'string' ? JSON.parse(payload.data) : payload.data;
                    const msg = messageData.message ? messageData.message : messageData;

                    // Only append if it belongs to the current active conversation
                    const activeConvId = parseInt(document.getElementById('conversationIdInput').value);
                    if (parseInt(msg.conversation_id) === activeConvId) {
                        appendMessageToUI(msg);
                        scrollToBottom();
                    }
                }
            };

            socket.onclose = () => {
                statusDot.className = 'status-dot';
                statusText.innerText = 'مقطوع الاتصال';
            };
        }

        function appendMessageToUI(msg) {
            const messagesArea = document.getElementById('messagesArea');
            const currentUserId = parseInt(document.getElementById('currentUserSelect').value);

            const isOutgoing = parseInt(msg.sender_id) === currentUserId;

            const time = msg.created_at
                ? new Date(msg.created_at).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' })
                : '';
            const senderName = msg.sender ? msg.sender.name : 'مستخدم';

            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${isOutgoing ? 'outgoing' : 'incoming'}`;

            // استخدام margin بدل align-self لأن align-self بيتأثر بـ RTL
            // margin-left:auto دايمًا بيدفع الرسالة ليمين فيزيائياً
            // margin-right:auto دايمًا بيدفع الرسالة ليسار فيزيائياً
            if (isOutgoing) {
                bubble.style.marginLeft = 'auto';
                bubble.style.marginRight = '0';
            } else {
                bubble.style.marginRight = 'auto';
                bubble.style.marginLeft = '0';
            }

            bubble.innerHTML = `
                <span class="sender-name">${senderName}</span>
                <div>${msg.message}</div>
                <span class="message-time">${time}</span>
            `;

            messagesArea.appendChild(bubble);
        }

        function scrollToBottom() {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Send message API Call
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            const conversationId = parseInt(document.getElementById('conversationIdInput').value);
            const senderId = parseInt(document.getElementById('currentUserSelect').value);

            // Clear input
            input.value = '';

            try {
                const response = await fetch('/api/chat/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        conversation_id: conversationId,
                        sender_id: senderId,
                        message: text
                    })
                });

                const result = await response.json();
                if (!result.success) {
                    alert('فشل في إرسال الرسالة!');
                }
            } catch (error) {
                console.error("Error sending message:", error);
            }
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function loadMessagesAndReconnect() {
            const conversationId = parseInt(document.getElementById('conversationIdInput').value);
            fetchMessages(conversationId);
            connectWebsocket(conversationId);
        }

        // Initial Load
        window.onload = () => {
            const conversationId = parseInt(document.getElementById('conversationIdInput').value);
            fetchMessages(conversationId);
            connectWebsocket(conversationId);
        };
    </script>
</body>

</html>
